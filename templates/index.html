{{define "content"}}
<div class="intro">
  <p>Software engineer writing about systems, architecture, and the occasional side project.</p>
  <p class="visitor-count">{{.Visitors}} unique visitors</p>
</div>

<section class="posts">
  {{range .Posts}}
  <article class="post-item">
    <time datetime="{{.Date.Format " 2006-01-02"}}">{{.Date.Format "2 January, 2006"}}</time>
    <h2><a href="/post/{{.Slug}}">{{.Title}}</a></h2>
  </article>
  {{else}}
  <p>No posts yet. Check back soon!</p>
  {{end}}
</section>
{{end}}
